server {
    listen 80;
    server_name www.savint.it savint.it;

    # Redirect to HTTPS (uncomment after setting up SSL)
    # return 301 https://$host$request_uri;

    # Landing page — static HTML
    location = / {
        root /var/www/savint-landing;
        try_files /index.html =404;
    }

    # SAVINT app — Next.js via PM2
    location /savint/ {
        proxy_pass http://127.0.0.1:3000/savint/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # Socket.io — WebSocket support
    location /savint/api/socketio/ {
        proxy_pass http://127.0.0.1:3000/savint/api/socketio/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }
}

